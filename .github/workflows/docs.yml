name: Docs

on:
  pull_request:
    paths:
      - apps/docs/**
      - packages/registry/**
      - packages/ui/**
      - packages/tokens/**
      - packages/utils/**
      - package.json
      - pnpm-workspace.yaml
      - turbo.json
  push:
    branches:
      - main
    paths:
      - apps/docs/**
      - packages/registry/**
      - packages/ui/**
      - packages/tokens/**
      - packages/utils/**
      - package.json
      - pnpm-workspace.yaml
      - turbo.json

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build docs and dependencies
        run: pnpm turbo run build --filter=@nim-ui/docs
